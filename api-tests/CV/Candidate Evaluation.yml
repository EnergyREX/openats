info:
  name: Candidate Evaluation
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/candidate/evaluate"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - /home/energyrex/Descargas/cv-francisco-single-column.pdf
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:6500

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
