info:
  name: Refresh Token
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/refresh"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("accessToken", res.body.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
